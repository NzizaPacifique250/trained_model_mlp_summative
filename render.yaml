# Render Blueprint – deploy API + UI as Docker services
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── FastAPI backend ──
  - type: web
    name: model-prediction-ml-pipeliene-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    envVars:
      - key: PYTHONPATH
        value: /app

  # ── React frontend ──
  - type: web
    name: model-prediction-ml-pipeliene
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: API_URL
        value: https://model-prediction-ml-pipeliene-api.onrender.com
